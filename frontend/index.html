<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Catatan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Aplikasi Catatan</h1>
            <p>Kelola catatan Anda dengan mudah</p>
        </header>

        <!-- Form Tambah/Edit Catatan -->
        <div class="form-section">
            <h2 id="form-title">Tambah Catatan Baru</h2>
            <form id="note-form">
                <input type="hidden" id="note-id">
                <div class="form-group">
                    <label for="judul">Judul:</label>
                    <input type="text" id="judul" name="judul" placeholder="Masukkan judul catatan" required>
                </div>
                <div class="form-group">
                    <label for="isi">Isi Catatan:</label>
                    <textarea id="isi" name="isi" rows="5" placeholder="Tulis isi catatan di sini..." required></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submit-btn" class="btn btn-primary">💾 Simpan</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary" style="display: none;">❌ Batal</button>
                </div>
            </form>
        </div>

        <!-- Daftar Catatan -->
        <div class="notes-section">
            <h2>📚 Daftar Catatan</h2>
            <div id="loading" class="loading">Memuat catatan...</div>
            <div id="notes-list" class="notes-grid"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
